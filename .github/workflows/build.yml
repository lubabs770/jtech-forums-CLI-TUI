name: Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./...

      - name: NPM package smoke check
        run: |
          npm install --ignore-scripts
          node ./scripts/install.js --print-target
          npm pack --dry-run
