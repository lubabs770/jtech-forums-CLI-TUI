name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: "linux/amd64 linux/arm64 windows/amd64 windows/arm64"
          - os: macos-latest
            targets: "darwin/amd64 darwin/arm64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        run: |
          mkdir -p dist
          for target in ${{ matrix.targets }}; do
            os="${target%/*}"
            arch="${target#*/}"
            stagedir="dist/${os}-${arch}"
            mkdir -p "$stagedir"
            bin="jtechforums"
            if [ "$os" = "windows" ]; then
              bin="${bin}.exe"
            fi
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -o "${stagedir}/${bin}" ./cmd/jtech
            tar -C "$stagedir" -czf "dist/jtechforums-${os}-${arch}.tar.gz" "$bin"
            rm -rf "$stagedir"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d%H%M%S)}"
          gh release create "$tag" dist/*.tar.gz \
            --title "$tag" \
            --notes "Release $tag"
